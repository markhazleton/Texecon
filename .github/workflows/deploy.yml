name: CI and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Prevent overlapping page deployments
concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

env:
  # Set your custom domain for GitHub Pages
  CUSTOM_DOMAIN: texecon.com

permissions:
  contents: read

jobs:
  build:
    name: Build (and type-check)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Determine Vite base path and site URL
        shell: bash
        run: |
          # Validate PR builds against project pages paths to catch base-path issues.
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            REPO=$(echo "$GITHUB_REPOSITORY" | cut -d'/' -f2)
            OWNER=$(echo "$GITHUB_REPOSITORY" | cut -d'/' -f1)
            echo "PR build mode: validating with project-pages base path"
            echo "VITE_BASE_PATH=/${REPO}/" >> "$GITHUB_ENV"
            echo "SITE_BASE_URL=https://${OWNER}.github.io/${REPO}" >> "$GITHUB_ENV"
          # Prefer explicit CUSTOM_DOMAIN when provided on non-PR builds.
          elif [ -n "${CUSTOM_DOMAIN}" ]; then
            echo "Using CUSTOM_DOMAIN=$CUSTOM_DOMAIN"
            echo "VITE_BASE_PATH=/" >> "$GITHUB_ENV"
            echo "SITE_BASE_URL=https://${CUSTOM_DOMAIN}" >> "$GITHUB_ENV"
            # Ensure CNAME exists for Pages to register the custom domain
            echo "${CUSTOM_DOMAIN}" > client/public/CNAME
          elif [ -f client/public/CNAME ]; then
            echo "Detected CNAME file"
            echo "VITE_BASE_PATH=/" >> "$GITHUB_ENV"
            DOMAIN=$(tr -d '\n\r' < client/public/CNAME)
            echo "SITE_BASE_URL=https://$DOMAIN" >> "$GITHUB_ENV"
          else
            # Project pages default to '/<repo>/'
            echo "VITE_BASE_PATH=/${GITHUB_REPOSITORY#*/}/" >> "$GITHUB_ENV"
            OWNER=$(echo "$GITHUB_REPOSITORY" | cut -d'/' -f1)
            REPO=$(echo "$GITHUB_REPOSITORY" | cut -d'/' -f2)
            echo "SITE_BASE_URL=https://$OWNER.github.io/$REPO" >> "$GITHUB_ENV"
          fi

      - name: Build configuration summary
        shell: bash
        run: |
          {
            echo "### Build Configuration"
            echo "- Event: ${GITHUB_EVENT_NAME}"
            echo "- Ref: ${GITHUB_REF}"
            echo "- VITE_BASE_PATH: ${VITE_BASE_PATH}"
            echo "- SITE_BASE_URL: ${SITE_BASE_URL}"
            echo "- CUSTOM_DOMAIN: ${CUSTOM_DOMAIN}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install dependencies (incl. dev)
        run: npm ci --include=dev

      - name: Security audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Generate content artifacts
        run: npm run fetch:content

      - name: Normalize generated content types formatting
        run: npx prettier --write client/src/data/content-types.ts

      - name: Validate generated content types formatting
        run: npx prettier --check client/src/data/content-types.ts

      - name: Lint code
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Type check
        run: npm run type-check

      - name: Run tests
        run: npm run test:run

      - name: Check test coverage
        run: npm run test:coverage
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Validate build artifacts
        shell: bash
        run: |
          test -f target/index.html || (echo "Missing index.html" && exit 1)
          test -f target/version.json || (echo "Missing version.json" && exit 1)
          test -f target/sitemap.xml || (echo "Missing sitemap.xml" && exit 1)
          test -f target/robots.txt || (echo "Missing robots.txt" && exit 1)
          grep -Fq "${SITE_BASE_URL}" target/sitemap.xml || (echo "sitemap.xml missing expected base URL: ${SITE_BASE_URL}" && exit 1)

          if [ "${GITHUB_EVENT_NAME}" != "pull_request" ] && [ -n "${CUSTOM_DOMAIN}" ]; then
            test -f target/CNAME || (echo "Missing CNAME for deploy build" && exit 1)
            grep -Fxq "${CUSTOM_DOMAIN}" target/CNAME || (echo "CNAME does not match CUSTOM_DOMAIN=${CUSTOM_DOMAIN}" && exit 1)
          fi

          echo "✅ All critical build artifacts present"

      - name: Build output summary
        shell: bash
        run: |
          {
            echo "### Build Output"
            echo "- target/index.html: $(wc -c < target/index.html) bytes"
            echo "- target/sitemap.xml: $(wc -c < target/sitemap.xml) bytes"
            echo "- target/robots.txt: $(wc -c < target/robots.txt) bytes"
            echo "- target/version.json: $(cat target/version.json)"
            echo "- target directory size: $(du -sh target | cut -f1)"
          } >> "$GITHUB_STEP_SUMMARY"

      # Only prepare and upload the Pages artifact on non-PR events
      - name: Setup Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: ./target

  lighthouse:
    name: Lighthouse CI
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cache Lighthouse assets
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.npm
            ~/.cache
          key: ${{ runner.os }}-lighthouse-${{ hashFiles('package-lock.json', '.github/lighthouse/lighthouserc.json') }}
          restore-keys: |
            ${{ runner.os }}-lighthouse-

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: github-pages
          path: ./lighthouse-target

      - name: Extract artifact
        run: |
          cd lighthouse-target
          tar -xf artifact.tar
          cd ..

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@fcd65974f7c4c2bf0ee9d09b84d2489183c29726 # v12
        with:
          configPath: "./.github/lighthouse/lighthouserc.json"
          temporaryPublicStorage: true
          uploadArtifacts: true
          runs: 3

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
